# Railway — servico ulysses (Legal NER)
# Repo: https://github.com/MarceloMassarente/Ulysses
# Mesmo projeto Railway que RAGjuridico; repo Git separado.
#
# Settings:
#   Nome do servico: ulysses
#   Root Directory: /
#   Config file path: railway.toml
#   Dominio publico: nao (rede privada)
#   RAM minima sugerida: 8 GB (configurar no dashboard Railway; nao via config-as-code)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "main.py",
  "requirements.txt",
  "Dockerfile",
  ".dockerignore",
  "railway.toml",
]

[deploy]
startCommand = "sh -c 'exec uvicorn main:app --host 0.0.0.0 --port ${PORT:-5522} --workers 1'"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
