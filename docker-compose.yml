services:
  ulysses-ner-api:
    build: .
    container_name: ulysses_ner_node
    ports:
      - "5522:5522"
    environment:
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      - LEGAL_NER_AGGREGATION=first
      - LEGAL_NER_STRIDE=128
      - LEGAL_NER_MAX_LENGTH=512
      - LEGAL_NER_JURISPRUDENCIA_THRESHOLD=0.35
    restart: unless-stopped
